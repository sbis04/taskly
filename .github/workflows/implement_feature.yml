name: Implement Feature

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to implement'
        required: true
        type: number

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  ghost-implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        working-directory: notion_setup
        run: dart pub get

      - name: Fetch issue details
        id: issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }})
          echo "title=$(echo "$ISSUE_JSON" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "body<<GHEOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_JSON" | jq -r '.body // ""' >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

      - name: "Step 1: Investigate feature and propose implementation"
        working-directory: notion_setup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_FEATURE_DB_ID }}
          NOTION_VISION_PAGE_ID: ${{ secrets.NOTION_VISION_PAGE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: dart run bin/auto_investigate.dart

      - name: "Step 2: Create branch and PR"
        working-directory: notion_setup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_FEATURE_DB_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          TARGET_REPO: ${{ github.repository }}
        run: dart run bin/auto_deploy.dart
